<!-- Modal content injected into modal-box -->
<form method="dialog">
    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
</form>
<h3 class="text-lg font-bold mb-4">Person Details</h3>
<div class="space-y-2">
    <div class="grid grid-cols-3 gap-2">
        <dt class="font-semibold">First name:</dt>
        <dd class="col-span-2">{person.nameFirst ?: 'Not provided'}</dd>
    </div>
    <div class="grid grid-cols-3 gap-2">
        <dt class="font-semibold">Last name:</dt>
        <dd class="col-span-2">{person.nameLast}</dd>
    </div>
    <div class="grid grid-cols-3 gap-2">
        <dt class="font-semibold">Email:</dt>
        <dd class="col-span-2">{person.email}</dd>
    </div>
    <div class="grid grid-cols-3 gap-2">
        <dt class="font-semibold">Record no:</dt>
        <dd class="col-span-2">{person.id}</dd>
    </div>
</div>
<div class="modal-action">
    <form method="dialog">
        <button class="btn btn-secondary">Close</button>
    </form>
</div>
